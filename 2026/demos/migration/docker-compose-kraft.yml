# ──────────────────────────────────────────────────────────────
# Phase 2 — KRaft Only: ZooKeeper Removed
# ──────────────────────────────────────────────────────────────
# After migration finalization, this compose file represents
# the final state: 3 KRaft controllers + 3 Kafka brokers.
# No ZooKeeper anywhere.
#
# Usage:
#   docker compose -f docker-compose-kraft.yml up -d
# ──────────────────────────────────────────────────────────────

services:

  # ── KRaft Controllers ──────────────────────────────────────

  controller-1:
    image: apache/kafka:3.9.2
    container_name: controller-1
    hostname: controller-1
    environment:
      KAFKA_NODE_ID: 100
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/kafka/metadata
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - ctrl1-data:/var/kafka/metadata
    networks:
      - kafka-net

  controller-2:
    image: apache/kafka:3.9.2
    container_name: controller-2
    hostname: controller-2
    environment:
      KAFKA_NODE_ID: 101
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/kafka/metadata
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - ctrl2-data:/var/kafka/metadata
    networks:
      - kafka-net

  controller-3:
    image: apache/kafka:3.9.2
    container_name: controller-3
    hostname: controller-3
    environment:
      KAFKA_NODE_ID: 102
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/kafka/metadata
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - ctrl3-data:/var/kafka/metadata
    networks:
      - kafka-net

  # ── Kafka Brokers (KRaft mode — no ZooKeeper) ──────────────

  broker-1:
    image: apache/kafka:3.9.2
    container_name: broker-1
    hostname: broker-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://broker-1:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_DIRS: /var/kafka/data
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - broker1-data:/var/kafka/data
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    networks:
      - kafka-net

  broker-2:
    image: apache/kafka:3.9.2
    container_name: broker-2
    hostname: broker-2
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093,INTERNAL://broker-2:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_DIRS: /var/kafka/data
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - broker2-data:/var/kafka/data
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    networks:
      - kafka-net

  broker-3:
    image: apache/kafka:3.9.2
    container_name: broker-3
    hostname: broker-3
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094,INTERNAL://broker-3:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_DIRS: /var/kafka/data
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - broker3-data:/var/kafka/data
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    networks:
      - kafka-net

volumes:
  ctrl1-data:
  ctrl2-data:
  ctrl3-data:
  broker1-data:
  broker2-data:
  broker3-data:

networks:
  kafka-net:
    driver: bridge
