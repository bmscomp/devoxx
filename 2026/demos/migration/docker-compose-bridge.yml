# ──────────────────────────────────────────────────────────────
# Phase 1 — Bridge Mode: KRaft Controllers + ZK Brokers
# ──────────────────────────────────────────────────────────────
# This compose file adds 3 dedicated KRaft controllers while
# keeping the existing ZooKeeper ensemble and Kafka brokers.
# Brokers are configured with migration mode enabled so that
# metadata is dual-written to both ZK and the KRaft log.
#
# Usage:
#   docker compose -f docker-compose-bridge.yml up -d
# ──────────────────────────────────────────────────────────────

services:

  # ── ZooKeeper Ensemble (unchanged) ─────────────────────────

  zookeeper-1:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: zookeeper-1
    hostname: zookeeper-1
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVER_1: zookeeper-1:2888:3888
      ZOOKEEPER_SERVER_2: zookeeper-2:2888:3888
      ZOOKEEPER_SERVER_3: zookeeper-3:2888:3888
    volumes:
      - zk1-data:/var/lib/zookeeper/data
      - zk1-log:/var/lib/zookeeper/log
    networks:
      - kafka-net

  zookeeper-2:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: zookeeper-2
    hostname: zookeeper-2
    ports:
      - "2182:2181"
    environment:
      ZOOKEEPER_SERVER_ID: 2
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVER_1: zookeeper-1:2888:3888
      ZOOKEEPER_SERVER_2: zookeeper-2:2888:3888
      ZOOKEEPER_SERVER_3: zookeeper-3:2888:3888
    volumes:
      - zk2-data:/var/lib/zookeeper/data
      - zk2-log:/var/lib/zookeeper/log
    networks:
      - kafka-net

  zookeeper-3:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: zookeeper-3
    hostname: zookeeper-3
    ports:
      - "2183:2181"
    environment:
      ZOOKEEPER_SERVER_ID: 3
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SERVER_1: zookeeper-1:2888:3888
      ZOOKEEPER_SERVER_2: zookeeper-2:2888:3888
      ZOOKEEPER_SERVER_3: zookeeper-3:2888:3888
    volumes:
      - zk3-data:/var/lib/zookeeper/data
      - zk3-log:/var/lib/zookeeper/log
    networks:
      - kafka-net

  # ── KRaft Controllers (NEW) ────────────────────────────────

  controller-1:
    image: confluentinc/cp-kafka:7.8.0
    container_name: controller-1
    hostname: controller-1
    environment:
      KAFKA_NODE_ID: 100
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/metadata
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - ctrl1-data:/var/lib/kafka/metadata
    networks:
      - kafka-net

  controller-2:
    image: confluentinc/cp-kafka:7.8.0
    container_name: controller-2
    hostname: controller-2
    environment:
      KAFKA_NODE_ID: 101
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/metadata
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - ctrl2-data:/var/lib/kafka/metadata
    networks:
      - kafka-net

  controller-3:
    image: confluentinc/cp-kafka:7.8.0
    container_name: controller-3
    hostname: controller-3
    environment:
      KAFKA_NODE_ID: 102
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/metadata
      KAFKA_CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - ctrl3-data:/var/lib/kafka/metadata
    networks:
      - kafka-net

  # ── Kafka Brokers (migration mode enabled) ─────────────────

  broker-1:
    image: confluentinc/cp-kafka:7.8.0
    container_name: broker-1
    hostname: broker-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      # ZooKeeper connection (still required during bridge)
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      # KRaft controller quorum (NEW)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Migration flag
      KAFKA_ZOOKEEPER_METADATA_MIGRATION_ENABLE: "true"
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://broker-1:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_INTER_BROKER_PROTOCOL_VERSION: "3.9"
    volumes:
      - broker1-data:/var/lib/kafka/data
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
      - controller-1
      - controller-2
      - controller-3
    networks:
      - kafka-net

  broker-2:
    image: confluentinc/cp-kafka:7.8.0
    container_name: broker-2
    hostname: broker-2
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ZOOKEEPER_METADATA_MIGRATION_ENABLE: "true"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093,INTERNAL://broker-2:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_INTER_BROKER_PROTOCOL_VERSION: "3.9"
    volumes:
      - broker2-data:/var/lib/kafka/data
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
      - controller-1
      - controller-2
      - controller-3
    networks:
      - kafka-net

  broker-3:
    image: confluentinc/cp-kafka:7.8.0
    container_name: broker-3
    hostname: broker-3
    ports:
      - "9094:9092"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:2181,zookeeper-2:2181,zookeeper-3:2181
      KAFKA_CONTROLLER_QUORUM_VOTERS: 100@controller-1:9093,101@controller-2:9093,102@controller-3:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ZOOKEEPER_METADATA_MIGRATION_ENABLE: "true"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9094,INTERNAL://broker-3:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_INTER_BROKER_PROTOCOL_VERSION: "3.9"
    volumes:
      - broker3-data:/var/lib/kafka/data
    depends_on:
      - zookeeper-1
      - zookeeper-2
      - zookeeper-3
      - controller-1
      - controller-2
      - controller-3
    networks:
      - kafka-net

volumes:
  zk1-data:
  zk1-log:
  zk2-data:
  zk2-log:
  zk3-data:
  zk3-log:
  ctrl1-data:
  ctrl2-data:
  ctrl3-data:
  broker1-data:
  broker2-data:
  broker3-data:

networks:
  kafka-net:
    driver: bridge
